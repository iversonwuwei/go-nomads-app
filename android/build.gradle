def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { localProperties.load(it) }
}
def flutterSdkPath = localProperties.getProperty("flutter.sdk")
def flutterMavenUri = flutterSdkPath != null
    ? uri("file:///${flutterSdkPath.replace('\\', '/')}/bin/cache/artifacts/engine/android")
    : null

allprojects {
    repositories {
        google()
        mavenCentral()
        // 高德地图 Maven 仓库
        maven { url 'https://maven.aliyun.com/repository/public/' }
        maven { url 'https://jitpack.io' }
        // 启用 bintray 仓库（部分老版本依赖需要）
        maven { url 'https://dl.bintray.com/thelasterstar/maven/' }
        if (flutterMavenUri != null) {
            maven { url flutterMavenUri }
        }
        maven { url 'https://storage.googleapis.com/download.flutter.io' }
        maven { url 'https://storage.flutter-io.cn/download.flutter.io' }
    }
}

rootProject.buildDir = "../build"

subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
