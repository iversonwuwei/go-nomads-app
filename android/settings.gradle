pluginManagement {
    def properties = new Properties()
    file("local.properties").withInputStream { properties.load(it) }
    def sdkPath = properties.getProperty("flutter.sdk")
    assert sdkPath != null, "flutter.sdk not set in local.properties"
    settings.ext.set("flutterSdkPath", sdkPath)

    includeBuild("$sdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.9.1" apply false
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
        maven { url 'https://maven.aliyun.com/repository/public/' }
        maven { url 'https://jitpack.io' }
        def flutterMavenUri = settings.ext.has("flutterSdkPath") && settings.ext.flutterSdkPath != null
            ? uri("file://${settings.ext.flutterSdkPath.replace('\\', '/')}/bin/cache/artifacts/engine/android")
            : null
        if (flutterMavenUri != null) {
            maven { url flutterMavenUri }
        }
        maven { url 'https://storage.googleapis.com/download.flutter.io' }
        maven { url 'https://storage.flutter-io.cn/download.flutter.io' }
    }
}

include ":app"
