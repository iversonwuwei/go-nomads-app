<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>
  
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bgGradient)"/>
  
  <!-- 定位图标外形 -->
  <path d="M512,120 C340,120 200,260 200,432 C200,650 512,900 512,900 C512,900 824,650 824,432 C824,260 684,120 512,120 Z" fill="#FFFFFF"/>
  
  <!-- 内部圆形 - 代表地球 -->
  <circle cx="512" cy="400" r="180" fill="url(#bgGradient)"/>
  
  <!-- 简化地球经线 -->
  <ellipse cx="512" cy="400" rx="80" ry="180" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-opacity="0.8"/>
  
  <!-- 简化地球纬线 -->
  <line x1="332" y1="400" x2="692" y2="400" stroke="#FFFFFF" stroke-width="12" stroke-opacity="0.8"/>
  
  <!-- WiFi 信号弧线 - 代表远程连接 -->
  <path d="M420,340 A130,130 0 0,1 604,340" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-opacity="0.6"/>
  <path d="M450,300 A90,90 0 0,1 574,300" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" stroke-opacity="0.7"/>
  <path d="M480,265 A50,50 0 0,1 544,265" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" stroke-opacity="0.8"/>
  
  <!-- 中心点 -->
  <circle cx="512" cy="400" r="25" fill="#FFFFFF"/>
</svg>
